<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helados Deliciosos </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1> Helados Deliciosos</h1>
        <p>Elige tus sabores favoritos y arma tu pedido</p>
    </header>

    <main>
        <!-- Sabores -->
        <section class="sabores">
            <h2>Elige tus sabores</h2>
            <div class="grid-sabores" id="sabores-container">
                <!-- Se llenan con JavaScript -->
            </div>
        </section>

        <!-- Opciones adicionales -->
        <section class="opciones">
            <h2>Opciones adicionales</h2>
            
            <div class="opcion">
                <label>
                    <input type="checkbox" id="cono" value="Cono"> 
                    Cono de galleta (+$2.000)
                </label>
            </div>
            
            <div class="opcion">
                <label>
                    <input type="checkbox" id="vaso" value="Vaso" checked> 
                    Vaso de plástico (+$1.000)
                </label>
            </div>
            
            <div class="opcion">
                <label>Cantidad de bolas:</label>
                <select id="cantidad-bolas">
                    <option value="1">1 bola - $8.000</option>
                    <option value="2" selected>2 bolas - $14.000</option>
                    <option value="3">3 bolas - $19.000</option>
                    <option value="4">4 bolas - $23.000</option>
                </select>
            </div>
        </section>

        <!-- Resumen del pedido -->
        <section class="resumen">
            <h2>Tu pedido</h2>
            <div id="resumen-pedido">
                <p>Aún no has seleccionado sabores...</p>
            </div>
            
            <div class="total">
                <strong>Total: <span id="total-precio">$0</span></strong>
            </div>

            <button id="btn-pedir" class="btn-pedir">¡Pedir ahora! </button>
        </section>
    </main>

    <footer>
        <p>Helados Deliciosos  2026 - Bogotá, Colombia</p>
    </footer>

    <script src="helados_Mi_Alegria.js"></script>
</body>
</html>
