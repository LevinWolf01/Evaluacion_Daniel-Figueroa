<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameRent - Renta de Consolas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1><i class="fas fa-gamepad"></i> GameRent</h1>
            <p>Renta consolas por horas, días o semanas</p>
        </div>
    </header>

    <main>
        <!-- Filtros -->
        <section class="filtros">
            <h2>Consolas Disponibles</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="playstation">PlayStation</button>
                <button class="filter-btn" data-filter="xbox">Xbox</button>
                <button class="filter-btn" data-filter="nintendo">Nintendo</button>
            </div>
        </section>

        <!-- Catálogo de consolas -->
        <section class="catalogo" id="catalogo">
            <!-- Se llena con JavaScript -->
        </section>

        <!-- Resumen del carrito -->
        <section class="carrito" id="carrito">
            <h2>Tu renta <span id="contador-carrito">0</span></h2>
            <div id="items-carrito"></div>
            <div class="total-carrito">
                <strong>Total: $<span id="total-precio">0</span></strong>
            </div>
            <button id="btn-rentar" class="btn-rentar">Confirmar Renta</button>
        </section>
    </main>

    <footer>
        <p>GameRent  2026 - Alquiler de consolas en Bogotá | Entrega a domicilio disponible</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
